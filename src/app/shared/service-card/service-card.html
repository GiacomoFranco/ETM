<a class="card-info" [routerLink]="'/servicios/' + service().slug">
  <img
    class="card-image"
    [ngSrc]="
      imageOrientation() === 'vertical' ? service().verticalImage : service().horizontalImage
    "
    [alt]="service().title"
    (load)="onImageLoad()"
    loading="lazy"
    decoding="async"
    fill />
  <h4 class="l-white-text">{{ service().title }}</h4>
</a>
