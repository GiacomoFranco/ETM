<section>
  @let currentService = service();
  <div class="service-heading">
    <h2 class="black-text">{{ currentService.title }}</h2>
    <p class="black-text">{{ currentService.summary }}</p>
  </div>
  <div class="service-content">
    <div [innerHTML]="currentService.description"></div>
  </div>
</section>
